<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- 둥근 사각형 클립 마스크 -->
    <clipPath id="roundedClip">
      <rect x="0" y="0" width="100" height="100" rx="20" ry="20"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect x="0" y="0" width="100" height="100" rx="20" ry="20" fill="#3d3d3d"/>

  <!--
    SilverGuard SS 로고 재현:
    원본 분석:
    - 두 S 글자가 세로로 배열: 위쪽 S는 오른쪽으로 열리고, 아래쪽 S는 위쪽 S 오른쪽 아래에 겹쳐 배치
    - 각 S는 두 개의 둥근 호(arc)로 구성됨
    - 전체적으로 왼쪽 상단에서 오른쪽 하단으로 대각선 배치
    - S 글자 두께: 약 로고 전체의 20%
  -->

  <!-- 왼쪽(위) S: 상단 반원 + 하단 반원 -->
  <!-- 상단 반원 (위로 볼록, 오른쪽 열림) -->
  <path d="
    M 18,35
    C 18,20 32,14 44,18
    C 52,21 56,27 52,33
    C 50,37 44,39 38,41
    C 30,43 22,46 20,52
    C 17,59 22,68 34,70
    C 42,72 52,68 54,62
  "
  stroke="white" stroke-width="9" stroke-linecap="round" fill="none"
  clip-path="url(#roundedClip)"/>

  <!-- 오른쪽(아래) S: 위 S보다 오른쪽 아래로 약 16px 오프셋 -->
  <path d="
    M 34,51
    C 34,36 48,30 60,34
    C 68,37 72,43 68,49
    C 66,53 60,55 54,57
    C 46,59 38,62 36,68
    C 33,75 38,84 50,86
    C 58,88 68,84 70,78
  "
  stroke="white" stroke-width="9" stroke-linecap="round" fill="none"
  clip-path="url(#roundedClip)"/>
</svg>
